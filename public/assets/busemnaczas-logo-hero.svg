<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="BusemNaCzas.pl">

  <!-- Clock / speedometer ring -->
  <g transform="translate(240,110)">
    <!-- Outer ring arc (top 270° — open at bottom like a speedometer) -->
    <path d="M -88 8 A 90 90 0 1 1 88 8" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="0" y1="-90" x2="0" y2="-74" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <line x1="63.6" y1="-63.6" x2="52.3" y2="-52.3" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-63.6" y1="-63.6" x2="-52.3" y2="-52.3" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="8" x2="74" y2="8" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-90" y1="8" x2="-74" y2="8" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- Hour hand (pointing ~10 o'clock direction) -->
    <line x1="0" y1="0" x2="-36" y2="-50" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <!-- Minute / speed hand (pointing ~1 o'clock direction, blue) -->
    <line x1="0" y1="0" x2="28" y2="-54" stroke="#0057b8" stroke-width="7" stroke-linecap="round"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="7" fill="#fff"/>
  </g>

  <!-- Van silhouette -->
  <g transform="translate(118,148)">
    <!-- Body -->
    <path d="M 10 62 L 10 22 Q 10 14 18 12 L 108 8 Q 140 7 162 16 L 208 28 Q 230 34 238 48 L 244 62 Z"
          fill="#111" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Cab roof transition -->
    <path d="M 108 8 L 108 62" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <!-- Windshield -->
    <path d="M 116 13 L 154 16 Q 168 18 178 28 L 184 36 L 116 34 Z"
          fill="#1a2a3a" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Side windows (passenger area) -->
    <rect x="20" y="18" width="28" height="20" rx="3" fill="#1a2a3a" stroke="#fff" stroke-width="1.5"/>
    <rect x="54" y="16" width="28" height="22" rx="3" fill="#1a2a3a" stroke="#fff" stroke-width="1.5"/>
    <!-- Door line -->
    <line x1="52" y1="12" x2="52" y2="62" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <!-- Rear light cluster -->
    <rect x="10" y="30" width="8" height="16" rx="2" fill="#c0c8d0" stroke="#fff" stroke-width="1"/>
    <!-- Renault diamond badge hint -->
    <polygon points="207,34 214,40 207,46 200,40" fill="#fff" opacity="0.7"/>
    <!-- Underbody / skirt line -->
    <line x1="10" y1="62" x2="244" y2="62" stroke="#fff" stroke-width="2"/>
    <!-- Front bumper -->
    <path d="M 228 48 Q 248 50 252 58 L 252 62 L 228 62 Z" fill="#222" stroke="#fff" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="56" cy="70" r="20" fill="#1a1a1a" stroke="#fff" stroke-width="3"/>
    <circle cx="56" cy="70" r="10" fill="#2a2a2a" stroke="#fff" stroke-width="2"/>
    <circle cx="56" cy="70" r="3" fill="#fff"/>
    <circle cx="196" cy="70" r="20" fill="#1a1a1a" stroke="#fff" stroke-width="3"/>
    <circle cx="196" cy="70" r="10" fill="#2a2a2a" stroke="#fff" stroke-width="2"/>
    <circle cx="196" cy="70" r="3" fill="#fff"/>
    <!-- Motion streaks (blue, left of van) -->
    <line x1="-8" y1="38" x2="8" y2="38" stroke="#0057b8" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="-18" y1="48" x2="6" y2="48" stroke="#0057b8" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="-24" y1="56" x2="4" y2="56" stroke="#0057b8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Wordmark: "busem" (white bold) -->
  <text x="75" y="282" font-family="'Inter Tight',Arial,sans-serif" font-size="62" font-weight="800"
        fill="#ffffff" letter-spacing="-2">busem</text>
  <!-- Wordmark: "naczas" (white bold) -->
  <text x="244" y="282" font-family="'Inter Tight',Arial,sans-serif" font-size="62" font-weight="800"
        fill="#ffffff" letter-spacing="-2">naczas</text>
  <!-- Wordmark: ".pl" (blue bold) -->
  <text x="400" y="282" font-family="'Inter Tight',Arial,sans-serif" font-size="62" font-weight="800"
        fill="#0057b8" letter-spacing="-2">.pl</text>

  <!-- Tagline dividers + text -->
  <g transform="translate(240,308)" text-anchor="middle">
    <line x1="-152" y1="0" x2="-32" y2="0" stroke="#0057b8" stroke-width="2"/>
    <line x1="32" y1="0" x2="152" y2="0" stroke="#0057b8" stroke-width="2"/>
    <text font-family="'Inter Tight',Arial,sans-serif" font-size="13" font-weight="700"
          fill="#ffffff" letter-spacing="4">WYNAJEM BUSÓW OSOBOWYCH</text>
  </g>

</svg>
